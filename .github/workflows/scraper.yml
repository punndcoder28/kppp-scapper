name: Tender Scraper

on:
  schedule:
    - cron: '30 2 * * 1'   # Monday 8:00 AM IST (2:30 AM UTC)
    - cron: '30 2 * * 4'   # Thursday 8:00 AM IST (2:30 AM UTC)
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          sudo apt-get install -y libasound2t64 libgbm1 libnss3 libxss1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0
          playwright install chromium

      - name: Run tender scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python main.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="report/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add reports/ last_run.txt index.html
          git diff --cached --quiet || git commit -m "chore(reports): add tender report for $(date +%Y-%m-%d)"
          git push origin "$BRANCH" --force

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="report/$(date +%Y-%m-%d)"
          DATE="$(date +%Y-%m-%d)"
          # Open PR only if one doesn't already exist for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq length)
          if [ "$EXISTING" -eq 0 ]; then
            gh pr create \
              --title "chore(reports): tender report for $DATE" \
              --body "Automated tender report for **$DATE**.

          - Tenders scraped from KPPP daily email PDFs
          - Classified by Claude AI (haiku-4-5)
          - Merge to publish to GitHub Pages

          **Review the report before merging.**" \
              --base main \
              --head "$BRANCH"
          fi
